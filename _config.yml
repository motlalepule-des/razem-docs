title: Razem Documentation
description: Official documentation for the Razem platform by Digital Edge Solutions
baseurl: "/razem-docs"
url: "https://motlalepule-des.github.io"

theme: just-the-docs

# Just the Docs configuration
color_scheme: default
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links (top-right navigation)
aux_links:
  "GitHub":
    - "https://github.com/motlalepule-des"

aux_links_new_tab: true

# Navigation
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "&copy; 2025 Digital Edge Solutions. All rights reserved."

# Collections
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

# Defaults
defaults:
  - scope:
      path: "docs"
      type: "docs"
    values:
      layout: "default"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Exclude from build
exclude:
  - "*.gemspec"
  - "*.gem"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
